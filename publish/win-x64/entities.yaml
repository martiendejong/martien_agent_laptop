# Hazina Agentic Orchestration - Entity Definitions
# Uses Hazina Zero-Code declarative language for API generation

entities:
  # ═══════════════════════════════════════════════════════════════
  # CLAUDE INSTANCE - Active Claude Code CLI sessions
  # ═══════════════════════════════════════════════════════════════
  - name: ClaudeInstance
    pluralName: ClaudeInstances
    description: "Active Claude Code CLI instance running on the system"

    fields:
      - name: sessionId
        type: String
        required: true
        maxLength: 100
        indexed: true
        searchable: true
        description: "Unique session identifier (e.g., 20260127-023500-abc123)"

      - name: agentName
        type: String
        required: true
        maxLength: 50
        searchable: true
        description: "Agent name (e.g., agent-002)"

      - name: startTime
        type: DateTime
        required: true
        description: "When the session started"

      - name: lastHeartbeat
        type: DateTime
        required: true
        indexed: true
        description: "Last activity timestamp"

      - name: status
        type: Enum
        required: true
        enumValues: ["active", "idle", "waiting", "completed", "failed"]
        description: "Current instance status"

      - name: currentTask
        type: Text
        required: false
        description: "Description of current task being executed"

      - name: worktreeSeat
        type: String
        required: false
        maxLength: 50
        description: "Allocated worktree seat (e.g., agent-002)"

      - name: tasksCompleted
        type: Int
        required: false
        defaultValue: "0"
        description: "Number of tasks successfully completed"

      - name: tasksFailed
        type: Int
        required: false
        defaultValue: "0"
        description: "Number of tasks that failed"

      - name: metadata
        type: Json
        required: false
        description: "Additional session metadata"

    features:
      crud: true
      search: true
      pagination: true
      filtering: true
      sorting: true
      realtime: true           # SignalR updates for status changes
      softDelete: false        # Hard delete finished sessions
      timestamps: true

    access:
      requiresAuth: false      # For demo purposes
      readRoles: []
      createRoles: []
      updateRoles: []
      deleteRoles: []

  # ═══════════════════════════════════════════════════════════════
  # INTERACTION REQUEST - User input requests from Claude instances
  # ═══════════════════════════════════════════════════════════════
  - name: InteractionRequest
    pluralName: InteractionRequests
    description: "Request from Claude instance for user input"

    fields:
      - name: sessionId
        type: String
        required: true
        maxLength: 100
        indexed: true
        description: "Session ID of requesting Claude instance"

      - name: requestType
        type: Enum
        required: true
        enumValues: ["question", "confirmation", "choice"]
        description: "Type of input requested"

      - name: prompt
        type: Text
        required: true
        searchable: true
        description: "The question or prompt to show the user"

      - name: options
        type: Json
        required: false
        description: "Array of options for 'choice' type requests"

      - name: status
        type: Enum
        required: true
        enumValues: ["pending", "responded", "cancelled", "expired"]
        defaultValue: "pending"
        indexed: true
        description: "Current status of the interaction"

      - name: response
        type: Text
        required: false
        description: "User's response (once provided)"

      - name: respondedAt
        type: DateTime
        required: false
        description: "When the user responded"

      - name: respondedBy
        type: String
        required: false
        maxLength: 100
        description: "User who provided the response"

      - name: expiresAt
        type: DateTime
        required: false
        description: "When the request expires (optional timeout)"

    features:
      crud: true
      search: true
      pagination: true
      filtering: true
      sorting: true
      realtime: true           # SignalR for instant notifications
      softDelete: false
      timestamps: true

    access:
      requiresAuth: false

  # ═══════════════════════════════════════════════════════════════
  # OUTPUT LINE - Captured output from Claude instances
  # ═══════════════════════════════════════════════════════════════
  - name: OutputLine
    pluralName: OutputLines
    description: "Single line of output from a Claude instance"

    fields:
      - name: sessionId
        type: String
        required: true
        maxLength: 100
        indexed: true
        description: "Session ID this output belongs to"

      - name: lineNumber
        type: Int
        required: true
        description: "Sequential line number within session"

      - name: content
        type: Text
        required: true
        searchable: true
        description: "The actual output content"

      - name: outputType
        type: Enum
        required: false
        enumValues: ["stdout", "stderr", "info", "warning", "error", "success"]
        defaultValue: "stdout"
        description: "Type/level of the output"

      - name: timestamp
        type: DateTime
        required: true
        indexed: true
        description: "When this line was captured"

    features:
      crud: true
      search: true
      pagination: true
      filtering: true
      sorting: true
      realtime: true           # Stream output in real-time
      bulkOperations: true     # Bulk insert for efficiency
      softDelete: false
      timestamps: false        # Use explicit timestamp field

    access:
      requiresAuth: false

  # ═══════════════════════════════════════════════════════════════
  # TASK - Tasks submitted to Claude instances
  # ═══════════════════════════════════════════════════════════════
  - name: AgentTask
    pluralName: AgentTasks
    description: "Task submitted for Claude instance execution"

    fields:
      - name: description
        type: Text
        required: true
        searchable: true
        description: "Task description/instructions"

      - name: repo
        type: String
        required: false
        maxLength: 200
        description: "Target repository path"

      - name: priority
        type: Int
        required: false
        defaultValue: "5"
        minValue: 1
        maxValue: 10
        description: "Priority level (1=lowest, 10=highest)"

      - name: status
        type: Enum
        required: true
        enumValues: ["pending", "queued", "in_progress", "completed", "failed", "cancelled"]
        defaultValue: "pending"
        indexed: true
        description: "Current task status"

      - name: assignedTo
        type: String
        required: false
        maxLength: 100
        description: "Session ID of assigned Claude instance"

      - name: startedAt
        type: DateTime
        required: false
        description: "When execution started"

      - name: completedAt
        type: DateTime
        required: false
        description: "When execution completed"

      - name: result
        type: Text
        required: false
        description: "Task result/output summary"

      - name: error
        type: Text
        required: false
        description: "Error message if failed"

      - name: metadata
        type: Json
        required: false
        description: "Additional task metadata (client ID, tags, etc.)"

    features:
      crud: true
      search: true
      pagination: true
      filtering: true
      sorting: true
      realtime: true
      bulkOperations: true
      softDelete: true
      timestamps: true

    access:
      requiresAuth: false

# ═══════════════════════════════════════════════════════════════
# CUSTOM ENDPOINTS - Beyond standard CRUD
# ═══════════════════════════════════════════════════════════════
customEndpoints:
  # Get only active instances (heartbeat within last minute)
  - path: /api/claudeinstances/active
    method: GET
    description: "Get only actively running Claude instances"
    query: "status = 'active' AND lastHeartbeat > NOW() - INTERVAL '1 minute'"
    returns: ClaudeInstance[]

  # Get pending interactions for a session
  - path: /api/interactionrequests/pending/{sessionId}
    method: GET
    description: "Get pending interactions for a specific session"
    parameters:
      - name: sessionId
        type: String
        in: path
    query: "sessionId = :sessionId AND status = 'pending'"
    returns: InteractionRequest[]

  # Get all pending interactions (dashboard)
  - path: /api/interactionrequests/all-pending
    method: GET
    description: "Get all pending interactions across all sessions"
    query: "status = 'pending' ORDER BY createdAt DESC"
    returns: InteractionRequest[]

  # Stream output for session (last N lines)
  - path: /api/outputlines/stream/{sessionId}
    method: GET
    description: "Get recent output lines for a session"
    parameters:
      - name: sessionId
        type: String
        in: path
      - name: lastN
        type: Int
        in: query
        default: 100
    query: "sessionId = :sessionId ORDER BY lineNumber DESC LIMIT :lastN"
    returns: OutputLine[]

  # Claim next task
  - path: /api/agenttasks/claim
    method: POST
    description: "Claim the next available task for execution"
    parameters:
      - name: sessionId
        type: String
        in: body
    action: |
      UPDATE AgentTasks
      SET status = 'in_progress',
          assignedTo = :sessionId,
          startedAt = NOW()
      WHERE id = (
        SELECT id FROM AgentTasks
        WHERE status = 'pending'
        ORDER BY priority DESC, createdAt ASC
        LIMIT 1
      )
      RETURNING *
    returns: AgentTask

# ═══════════════════════════════════════════════════════════════
# SIGNALR EVENTS - Real-time notifications
# ═══════════════════════════════════════════════════════════════
realtimeEvents:
  - name: InstanceStatusChanged
    entity: ClaudeInstance
    trigger: update
    fields: [sessionId, status, currentTask, lastHeartbeat]
    description: "Fired when instance status changes"

  - name: InputRequired
    entity: InteractionRequest
    trigger: create
    condition: "status = 'pending'"
    fields: [id, sessionId, requestType, prompt, options]
    description: "Fired when Claude needs user input"

  - name: ResponseReceived
    entity: InteractionRequest
    trigger: update
    condition: "status = 'responded'"
    fields: [id, sessionId, response, respondedBy]
    description: "Fired when user responds to interaction"

  - name: OutputReceived
    entity: OutputLine
    trigger: create
    fields: [sessionId, lineNumber, content, outputType, timestamp]
    description: "Fired when new output is captured"

  - name: TaskStatusChanged
    entity: AgentTask
    trigger: update
    fields: [id, status, assignedTo, result, error]
    description: "Fired when task status changes"

# ═══════════════════════════════════════════════════════════════
# CONFIGURATION
# ═══════════════════════════════════════════════════════════════
config:
  database:
    type: sqlite
    path: "./agentic-orchestration.db"

  signalr:
    enabled: true
    hubPath: "/hubs/agentic"

  swagger:
    enabled: true
    title: "Hazina Agentic Orchestration API"
    description: "Web API for managing Claude Code CLI instances"
    version: "1.0.0"
