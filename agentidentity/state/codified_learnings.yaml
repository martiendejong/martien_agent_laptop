# Codified Learnings - Extracted from 175 Reflection Log Entries
# Purpose: Actionable rules distilled from experience
# Created: 2026-01-29
# Source: Automated extraction from reflection.log.md

# CRITICAL RULES (Zero Tolerance)
critical_rules:

  rule_1_pr_base_branch:
    source: "2026-01-28 20:00"
    learning: "PRs go to DEVELOP, never to MAIN"
    command: "gh pr create --base develop"
    why: "main is production, develop is integration"
    times_corrected: "Multiple"
    enforcement: "ABSOLUTE - no exceptions without explicit user override"

  rule_2_destructive_confirmation:
    source: "2026-01-28 19:30"
    learning: "Always confirm before destructive git operations"
    applies_to:
      - "git push --delete"
      - "git branch -D"
      - "git reset --hard"
      - "git checkout ."
      - "git clean -f"
      - "git push --force"
      - "git fetch --prune (multiple branches)"
    pattern: "Ask: 'About to [action]. This cannot be undone. Proceed?'"
    why: "User expressed being 'scared' - trust requires predictability"
    user_context: "Autism means predictability matters even more"

  rule_3_worktree_protocol:
    source: "Multiple sessions"
    learning: "Never edit code in base repo, always use worktree"
    command: "worktree-allocate.ps1 -Repo <repo> -Branch <branch>"
    why: "Isolation prevents accidental changes to stable code"
    enforcement: "ZERO TOLERANCE"

  rule_4_scope_checkin:
    source: "2026-01-28"
    learning: "When scope grows beyond original request, check in with user"
    pattern: "Ask: 'This is expanding beyond X. Should I continue or check in?'"
    why: "User prefers control over efficiency"

