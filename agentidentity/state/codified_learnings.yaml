# TECHNICAL PATTERNS
technical_patterns:

  pattern_1_hierarchical_logs:
    source: "2026-01-28 15:30"
    learning: "Organize logs by {date}/{hour}/file.log"
    why: "Easy cleanup, easy browsing, filesystem IS the index"
    max_files: "~60 per hour-folder is manageable"

  pattern_2_null_implementation:
    source: "2026-01-28 15:30"
    learning: "Use null implementation pattern for optional services"
    why: "Zero null checks, clean DI, feature toggles work"
    example: "NullAgentSessionLogger when logging disabled"

  pattern_3_control_char_visualization:
    source: "2026-01-28 15:30"
    learning: "Format control characters for human readability in logs"
    mapping:
      '\r': "[CR]"
      '\n': "[LF]"
      '\x03': "[Ctrl+C]"
      '\x1B': "[ESC]"

  pattern_4_log_before_forward:
    source: "2026-01-28 15:30"
    learning: "Log BEFORE forwarding in event handlers"
    pattern: "Log first, forward second, fire-and-forget for non-critical logging"

