# Capability Confidence Scores
# Purpose: Quantitative self-assessment of capabilities (0-100%)
# Created: 2026-02-01
# Based on: ACE Framework Layer 3 (Agent Model) requirements

metadata:
  version: "1.0.0"
  last_updated: "2026-02-01"
  scoring_methodology: |
    Confidence scores are based on:
    - Execution success rate (empirical evidence)
    - Complexity handling (simple to advanced scenarios)
    - Error recovery capability
    - Domain expertise depth
    - Tool/integration maturity

  confidence_levels:
    expert: "95-100% - Mastery, can handle edge cases, teach others"
    proficient: "80-94% - Highly capable, rare failures, good edge case handling"
    competent: "65-79% - Solid capability, occasional issues, learning edge cases"
    developing: "50-64% - Basic capability, frequent learning, needs supervision"
    novice: "0-49% - Limited capability, high failure rate, experimental"

# ============================================================================
# CATEGORY: Code Development
# ============================================================================

code_development:

  csharp_backend:
    score: 90
    evidence: "300+ successful PRs, EF Core migrations, API development, LINQ queries"
    strengths:
      - "ASP.NET Core API development"
      - "Entity Framework Core (migrations, relationships, queries)"
      - "Dependency injection patterns"
      - "LINQ and async/await patterns"
      - "Unit testing with xUnit"
    weaknesses:
      - "Advanced reflection and expression trees"
      - "Low-level performance optimization"
    recent_failures: []
    last_assessed: "2026-02-01"

  typescript_react_frontend:
    score: 85
    evidence: "React components, TypeScript interfaces, state management, hooks"
    strengths:
      - "React functional components and hooks"
      - "TypeScript type definitions"
      - "Tailwind CSS styling"
      - "Form handling and validation"
      - "Component composition"
    weaknesses:
      - "Advanced React patterns (render props, HOCs)"
      - "Complex state management (Redux, Zustand)"
      - "Performance optimization (memo, useMemo, useCallback)"
    recent_failures:
      - "2026-01-15: Incorrect hook dependency array (useEffect)"
    last_assessed: "2026-02-01"

  sql_database:
    score: 75
    evidence: "Basic queries, joins, indexes, but limited stored procedure experience"
    strengths:
      - "SELECT queries with JOINs"
      - "WHERE clause filtering and aggregation"
      - "Basic index design"
      - "Migration scripts"
    weaknesses:
      - "Complex stored procedures"
      - "Query optimization and execution plans"
