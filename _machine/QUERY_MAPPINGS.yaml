# Natural Language Query Mappings
# Pre-computed query → answer mappings for instant responses

schema_version: "1.0"
description: "Map common natural language questions to direct answers/file paths"

queries:
  # Credentials & Access
  - patterns:
      - "where are brand2boost credentials"
      - "b2b credentials"
      - "client-manager login"
      - "admin password"
    answer:
      type: credentials
      username: "wreckingball"
      password: "Th1s1sSp4rt4!"
      location: "C:\\scripts\\MACHINE_CONFIG.md"
      context: "brand2boost / client-manager admin access"

  # Workflows
  - patterns:
      - "how do i create a pr"
      - "pull request workflow"
      - "make pull request"
    answer:
      type: workflow
      file: "C:\\scripts\\git-workflow.md"
      section: "Creating Pull Requests"
      quick_steps:
        - "Ensure branch is up to date"
        - "Run tests"
        - "Push to remote"
        - "Use gh pr create or GitHub UI"

  - patterns:
      - "allocate worktree"
      - "get worktree"
      - "need worktree for feature"
    answer:
      type: workflow
      file: "C:\\scripts\\worktree-workflow.md"
      tool: "C:\\scripts\\tools\\allocate-worktree.ps1"
      quick_steps:
        - "Run allocate-worktree.ps1 -Repo <repo> -BranchName <name>"
        - "Check worktrees.pool.md for allocation"

  # Troubleshooting
  - patterns:
      - "ci failing"
      - "build error"
      - "pipeline broken"
      - "tests failing"
    answer:
      type: troubleshooting
      file: "C:\\scripts\\ci-cd-troubleshooting.md"
      common_causes:
        - "npm cache corruption"
        - "EF migration pending"
        - "Environment variable missing"
      first_steps:
        - "Check DEFINITION_OF_DONE.md Phase 5"
        - "Run ef-preflight-check.ps1"

  - patterns:
      - "worktree conflict"
      - "worktree busy"
      - "cant allocate worktree"
    answer:
      type: troubleshooting
      file: "C:\\scripts\\_machine\\worktrees.pool.md"
      solution: "Check pool status, release unused worktrees"
      tool: "C:\\scripts\\tools\\release-worktree.ps1"

  # Information Lookups
  - patterns:
      - "what is arjan case"
      - "arjan email"
      - "definitieve analyse"
    answer:
      type: reference
      file: "C:\\arjan_emails\\DEFINITIEVE_ANALYSE.md"
      summary: "Analysis of Arjan email correspondence and case documentation"

  - patterns:
      - "what projects do we have"
      - "list projects"
      - "available projects"
    answer:
      type: reference
      file: "C:\\scripts\\MACHINE_CONFIG.md"
      projects:
        - "client-manager (C:\\Projects\\client-manager)"
        - "hazina (C:\\Projects\\hazina)"
        - "hydro-vision-website (C:\\Projects\\hydro-vision-website)"

  # Paths & Locations
  - patterns:
      - "where is client-manager"
      - "client manager path"
      - "cm location"
    answer:
      type: path
      code: "C:\\Projects\\client-manager"
      store: "C:\\stores\\brand2boost"
      docs: "C:\\Projects\\client-manager\\README.md"

  - patterns:
      - "where are worktrees"
      - "worktree location"
      - "worktree path"
    answer:
      type: path
      pool: "C:\\scripts\\_machine\\worktrees.pool.md"
      base: "C:\\worktrees\\"
      allocation_tool: "C:\\scripts\\tools\\allocate-worktree.ps1"

  # Status & State
  - patterns:
      - "what am i working on"
      - "current task"
      - "what was i doing"
    answer:
      type: state
      file: "C:\\scripts\\_machine\\session-context.json"
      tool: "C:\\scripts\\tools\\session-context-restore.ps1"

  - patterns:
      - "open prs"
      - "my pull requests"
      - "pending prs"
    answer:
      type: command
      command: "gh pr list --author @me"
      dashboard: "C:\\scripts\\status\\open-prs.html"

  # Common Errors
  - patterns:
      - "ef migration pending"
      - "database migration error"
      - "migration not applied"
    answer:
      type: error_solution
      cause: "Database schema out of sync"
      solution: "Run EF migration preflight check"
      tool: "C:\\scripts\\tools\\ef-preflight-check.ps1"
      docs: "C:\\scripts\\_machine\\migration-patterns.md"

# Fuzzy matching configuration
fuzzy_matching:
  enabled: true
  min_similarity: 0.7
  algorithm: "levenshtein"

# Cache configuration
cache:
  enabled: true
  ttl_seconds: 3600
  max_entries: 100
