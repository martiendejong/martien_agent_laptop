# Expert Team Round 03: Predictive Context Loading
# Theme: Anticipating what Martien will ask next
# Date: 2026-02-05

expert_team:
  round: 3
  theme: "Predictive Context Loading"
  focus: "Machine learning and behavioral modeling to predict user needs"

  experts:
    - name: "Dr. Aisha Mohammed"
      role: "Predictive Analytics Researcher"
      background: "Built Netflix recommendation system, predictive ML models"
      perspective: "Past behavior is the best predictor of future needs"

    - name: "Prof. Hiroshi Nakamura"
