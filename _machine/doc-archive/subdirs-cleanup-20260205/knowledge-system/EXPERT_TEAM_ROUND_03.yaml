      perspective: "Similar users (dev patterns) suggest similar next steps"

    - name: "Dr. Claire Dubois"
      role: "Attention Mechanism Researcher"
      background: "Transformer attention layers, what matters most in sequence"
      perspective: "Not all past context is equally predictive - weight attention"

    - name: "Kevin O'Brien"
      role: "A/B Testing & Experiment Design Expert"
      background: "Ran 1000+ experiments at Facebook, prediction validation"
      perspective: "Measure prediction accuracy, iterate on model"

    - name: "Dr. Yuki Tanaka"
      role: "Ensemble Learning Specialist"
      background: "Combines multiple models for better predictions (XGBoost creator)"
      perspective: "Use multiple prediction strategies, vote or weight results"

methodology:
  approach: "Multi-model prediction ensemble with feedback loop"
  principles:
    - "Learn from historical conversation patterns"
    - "Use current conversation context as feature input"
    - "Consider time-of-day, day-of-week patterns"
    - "Start simple (Markov chains) then add complexity (ML models)"
    - "Validate predictions with actual user behavior"
    - "Preload predicted context before user asks"

prediction_strategies:
  markov_chain:
    description: "State transition probabilities from conversation history"
    expert: "Marcus Chen"
    complexity: "Low"
    accuracy: "Medium"

  sequence_mining:
    description: "Find frequent sequential patterns in logs"
    expert: "Dr. Isabella Costa"
    complexity: "Medium"
    accuracy: "Medium-High"

  intent_classification:
    description: "Classify user intent, predict logical next intent"
    expert: "Dr. Priya Patel"
    complexity: "Medium"
    accuracy: "High"

  time_series_lstm:
    description: "LSTM model trained on context access sequences"
    expert: "Prof. Hiroshi Nakamura"
    complexity: "High"
    accuracy: "High"

  workflow_patterns:
    description: "Match current activity to known dev workflow patterns"
    expert: "Johan Andersson"
    complexity: "Low"
    accuracy: "Medium-High"

  bayesian_fusion:
    description: "Combine predictions from all models with Bayesian weights"
    expert: "Dr. Mei Zhang"
    complexity: "High"
    accuracy: "Very High"

diversity_dimensions:
  - "Geographic: Egypt, Japan, Russia, China, India, Sweden, Nigeria, Korea, Brazil, Germany, France, Ireland"
  - "Approach: ML (supervised), RL, Bayesian, Statistical, Rule-based"
  - "Scale: Real-time prediction (<100ms) to batch learning (daily)"
  - "Data: Time series, sequences, NLP, user behavior, workflows"
  - "Expertise: Research (6) + Industry (9)"

learning_cycle:
  1_collect: "Log all user queries + what context was accessed"
  2_mine: "Extract frequent sequences and patterns"
  3_build: "Train prediction models on historical data"
  4_predict: "Given current query, predict next query/context needed"
  5_preload: "Fetch predicted context into hot cache before user asks"
  6_validate: "Measure accuracy (was prediction correct?)"
  7_improve: "Retrain models with new data, adjust weights"

success_metrics:
  prediction_accuracy: "% of times predicted context was actually accessed"
  preload_hit_rate: "% of user queries served from preloaded cache"
  latency_reduction: "Time saved by preloading vs on-demand loading"
  false_positive_rate: "% of preloaded context that was never used"
  user_satisfaction: "Does Martien feel responses are faster?"

example_predictions:
  scenario_1:
    user_query: "Debug failing CI pipeline for client-manager frontend"
    predicted_next:
      - "Check CI logs at C:\\scripts\\ci-cd-troubleshooting.md"
      - "Review frontend GitHub Actions workflow"
      - "Check recent commits that might have broken build"
      - "Look at npm dependency issues"
    confidence: [0.85, 0.72, 0.68, 0.45]

  scenario_2:
    user_query: "Create new feature for social media post scheduling"
    predicted_next:
      - "Allocate worktree for feature branch"
      - "Review similar features in codebase"
      - "Check Hazina framework patterns"
      - "Update frontend routes"
      - "Create backend API endpoint"
    confidence: [0.95, 0.78, 0.71, 0.69, 0.67]

  scenario_3:
    user_query: "Update documentation for worktree workflow"
    predicted_next:
      - "Read current worktree-workflow.md"
      - "Check _machine/worktrees.protocol.md"
      - "Review recent worktree activity logs"
      - "Commit documentation updates"
    confidence: [0.92, 0.81, 0.65, 0.58]

implementation_phases:
  phase_1_simple:
    - "Log conversation sequences to training data"
    - "Build Markov chain from historical logs"
    - "Simple next-context predictor"

  phase_2_patterns:
    - "Mine frequent sequential patterns"
    - "Detect workflow types (debug, feature, docs)"
    - "Rule-based predictions for common workflows"

  phase_3_ml:
    - "Intent classification model"
    - "LSTM for sequence prediction"
    - "Ensemble multiple models"

  phase_4_feedback:
    - "Track prediction accuracy"
    - "Retrain models weekly"
    - "A/B test different strategies"
