methodology:
  approach: "Embedding-based semantic search with hybrid ranking"
  principles:
    - "Convert text to vectors that capture meaning"
    - "Use cosine similarity for semantic relevance"
    - "Combine with keyword search for robustness"
    - "Cache embeddings to avoid recomputation"
    - "Update embeddings when documents change"

embedding_strategies:
  sentence_bert:
    description: "Pre-trained sentence embeddings (e.g., all-MiniLM-L6-v2)"
    pros: "Fast, good quality, runs locally"
    cons: "Fixed model, may not capture domain-specific terms"
    dim: 384
    speed: "~1ms per sentence on CPU"

  openai_embeddings:
    description: "OpenAI text-embedding-3-small or ada-002"
    pros: "Excellent quality, understands context deeply"
    cons: "API cost, latency, requires internet"
    dim: 1536
    speed: "~50-100ms per request"

  custom_fine_tuned:
    description: "Fine-tune on domain-specific data (worktree docs, dev workflows)"
    pros: "Optimized for specific use case"
    cons: "Requires training data and compute"
    dim: "Variable (128-768)"
    speed: "Similar to base model"

  tfidf_vectors:
    description: "Classic TF-IDF for keyword-based vectors"
    pros: "Simple, interpretable, no training needed"
    cons: "Ignores word meaning and order"
    dim: "Vocabulary size (~1000-10000)"
    speed: "<1ms"

use_cases:
  documentation_search:
    query: "How do I allocate a worktree for a new feature?"
    without_semantic: "Exact match 'allocate worktree' → limited results"
    with_semantic: "Matches: 'reserve worktree', 'get worktree', 'start new task worktree'"
    improvement: "3x more relevant results"

  pattern_discovery:
    query: "Best way to handle CI failures"
    without_semantic: "Must include exact phrase 'CI failures'"
    with_semantic: "Matches: 'pipeline errors', 'build problems', 'deployment issues'"
    improvement: "Finds related solutions even with different wording"

  conversation_recall:
    query: "When did we discuss database migrations?"
    without_semantic: "Must contain 'database migrations'"
    with_semantic: "Matches: 'EF Core updates', 'schema changes', 'DB versioning'"
    improvement: "Recalls related conversations with different terminology"

  code_search:
    query: "Function that validates user input"
    without_semantic: "Search for 'validate' in function names"
    with_semantic: "Finds: ValidateInput, CheckUserData, SanitizeInput, VerifyFormData"
    improvement: "Understands semantic equivalence"

similarity_metrics:
  cosine_similarity:
    formula: "cos(θ) = (A·B) / (||A|| ||B||)"
    range: "-1 to 1 (higher = more similar)"
    use: "Standard for embeddings"

  euclidean_distance:
    formula: "d = sqrt(sum((a_i - b_i)^2))"
    range: "0 to ∞ (lower = more similar)"
    use: "Alternative to cosine"

  dot_product:
    formula: "A·B = sum(a_i * b_i)"
    range: "Unbounded (higher = more similar if normalized)"
    use: "Fast, used in approximate search"

indexing_methods:
  flat_index:
    description: "Brute-force search all vectors"
    complexity: "O(n)"
    use: "Small datasets (<10k vectors)"

  hnsw:
    description: "Hierarchical Navigable Small World graphs"
    complexity: "O(log n)"
    use: "General purpose, good speed/accuracy tradeoff"

  ivf:
    description: "Inverted File Index with clustering"
    complexity: "O(sqrt(n))"
    use: "Large datasets (>100k vectors)"

  annoy:
    description: "Approximate Nearest Neighbors Oh Yeah (tree-based)"
    complexity: "O(log n)"
    use: "Read-heavy workloads, static index"

hybrid_search:
  approach: "Combine lexical and semantic scores"
  formula: "score = alpha * keyword_score + (1-alpha) * semantic_score"
  alpha: "0.3-0.7 (tune based on data)"

  benefits:
    - "Robust to both exact matches and semantic variations"
    - "Handles rare terms better (keyword) and common concepts (semantic)"
    - "User can't 'break' search with unexpected phrasing"

implementation_phases:
  phase_1_basic:
    - "Generate embeddings for all documentation files"
    - "Store embeddings with metadata (file path, chunk text)"
    - "Simple cosine similarity search"

  phase_2_index:
    - "Build vector index (FAISS or Annoy)"
    - "Implement approximate nearest neighbor search"
    - "Cache embeddings to disk"

  phase_3_hybrid:
    - "Combine keyword search (ripgrep) with semantic search"
    - "Rank results by hybrid score"
    - "Display top-K results with relevance scores"

  phase_4_advanced:
    - "Query expansion (related terms)"
    - "Re-ranking with cross-encoder"
    - "User feedback for relevance tuning"

