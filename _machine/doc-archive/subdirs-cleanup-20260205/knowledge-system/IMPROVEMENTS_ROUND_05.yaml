example_searches:
  example_1:
    query: "How to fix broken CI pipeline"
    keyword_results: ["ci-cd-troubleshooting.md (contains 'CI' and 'pipeline')"]
    semantic_results:
      - "ci-cd-troubleshooting.md (0.89 similarity)"
      - "development-patterns.md (section on build failures, 0.72)"
      - "reflection.log.md (past CI issues, 0.68)"
    hybrid_results: "Best of both, ranked by combined score"

  example_2:
    query: "Remember allocated worktrees"
    keyword_results: ["worktrees.pool.md (exact match 'allocated worktrees')"]
    semantic_results:
      - "worktrees.pool.md (0.92)"
      - "worktree-workflow.md (0.85)"
      - "worktrees.protocol.md (0.78)"
      - "worktrees.activity.md (0.71)"
    benefit: "Finds ALL worktree docs, not just one"

  example_3:
    query: "beste manier om database te updaten"  # Dutch
    keyword_results: ["No results (English docs)"]
    semantic_results:
      - "migration-patterns.md (0.81 - understands 'database update')"
      - "ef-migration-safety.md (0.76)"
    benefit: "Works across languages!"
