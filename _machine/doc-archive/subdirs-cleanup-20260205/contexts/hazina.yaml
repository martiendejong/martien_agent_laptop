    solution: "Ensure branch names match in both hazina and client-manager worktrees"
    prevention: "Use allocate-worktree.ps1 which handles paired allocation"

  - issue: "NuGet package version conflicts"
    solution: "Update package references in client-manager after hazina changes"
    prevention: "Coordinate NuGet versions across projects"

  - issue: "API key errors"
