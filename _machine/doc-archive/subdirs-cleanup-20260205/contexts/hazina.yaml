# ============================================================================
# KEY FEATURES
# ============================================================================

features:
  - name: "Multi-provider LLM orchestration"
    providers: [OpenAI, Anthropic, Ollama, Gemini, Mistral]
    status: production
    description: "Unified interface for multiple AI providers"

  - name: "Semantic caching"
    status: production
    benefit: "Reduce costs and latency for repeated queries"

  - name: "RAG (Retrieval-Augmented Generation)"
    status: production
    use_case: "Ground AI responses in specific knowledge bases"

  - name: "Agentic workflows"
    status: production
    description: "Multi-step AI reasoning with tool use"

  - name: "Multi-layer reasoning (Neurochain)"
    status: production
    description: "Hierarchical reasoning with fault detection"

  - name: "Hallucination prevention"
    status: production
    description: "Fault detection and verification layers"

  - name: "Cost tracking"
    status: production
    description: "Track API costs per request/session"

# ============================================================================
# COMMON WORKFLOWS
# ============================================================================

workflows:
  feature_development:
    protocol: C:\scripts\MANDATORY_CODE_WORKFLOW.md
    steps:
      1: "Create branch (feature/clickup-id-description)"
      2: "Allocate paired worktrees (hazina + client-manager)"
      3: "Make changes in worktree"
      4: "Build hazina first"
      5: "Build client-manager to verify integration"
      6: "Merge develop into branch"
      7: "Create PR with --base develop"
      8: "Add PR link to ClickUp task"

  worktree_allocation:
    skill: allocate-worktree
    tool: allocate-worktree.ps1
    critical_rule: "MUST allocate paired client-manager worktree with SAME branch name"
    tracking: C:\scripts\_machine\worktrees.pool.md

  build_verification:
    sequence:
      1: "Build hazina: dotnet build C:\\Projects\\hazina\\hazina.sln"
      2: "Build client-manager: dotnet build C:\\Projects\\client-manager\\backend.sln"
      3: "Verify no errors in dependent projects"

  pr_dependencies:
    skill: pr-dependencies
    description: "Track cross-repo PR dependencies"
    usage: "When hazina PR requires client-manager PR"

# ============================================================================
# DEVELOPMENT COMMANDS
# ============================================================================

commands:
  build: "dotnet build C:\Projects\hazina\hazina.sln"
  test: "dotnet test C:\Projects\hazina\tests"
  pack: "dotnet pack C:\Projects\hazina\hazina.csproj"

  nuget:
    status: planned
    description: "Will be published as NuGet package"

# ============================================================================
# ARCHITECTURE
# ============================================================================

architecture:
  layers:
    - name: "Provider Abstraction"
      purpose: "Unified interface for all AI providers"

    - name: "Semantic Caching"
      purpose: "Cache AI responses based on semantic similarity"

    - name: "RAG Engine"
      purpose: "Ground responses in knowledge bases"

    - name: "Neurochain"
      purpose: "Multi-layer reasoning with verification"

    - name: "Cost Tracking"
      purpose: "Monitor and optimize API costs"

  key_classes:
