# Expert Team Round 04: Cross-Session Memory
# Theme: Remembering context between sessions
# Date: 2026-02-05

expert_team:
  round: 4
  theme: "Cross-Session Memory"
  focus: "Persistent memory systems that maintain context across agent restarts"

  experts:
