# Expert Team Round 08: Version Control for Knowledge
# Theme: Tracking how context evolves over time
# Date: 2026-02-05

expert_team:
  round: 8
  theme: "Version Control for Knowledge"
  focus: "Systems that track, version, and provide historical views of knowledge evolution"

  experts:
    - name: "Linus van der Berg"
      role: "Version Control System Architect"
      background: "Git internals expert, designed distributed version control algorithms"
      perspective: "Every change to knowledge is a commit with parent, diff, and message"

    - name: "Dr. Margaret Chen"
      role: "Temporal Database Researcher"
      background: "PhD in temporal logic, bi-temporal database systems"
      perspective: "Knowledge has valid-time and transaction-time dimensions"

    - name: "Raj Kumar"
      role: "Wiki History Systems Designer"
      background: "Built revision history for MediaWiki and Confluence"
      perspective: "Users need to see who changed what when and why"

    - name: "Dr. Emily Watson"
      role: "Knowledge Evolution Analyst"
      background: "Studies how scientific knowledge evolves over decades"
      perspective: "Knowledge doesn't just grow, it refines and sometimes reverses"

    - name: "Carlos Rodriguez"
      role: "Snapshot and Restore Expert"
      background: "Built backup/restore systems for enterprise data warehouses"
      perspective: "Point-in-time recovery is critical for knowledge systems"

    - name: "Dr. Yuki Sato"
      role: "Diff Algorithm Specialist"
      background: "Created semantic diff algorithms for structured documents"
      perspective: "Show changes at conceptual level, not just line-by-line"

    - name: "Fatima Al-Rashid"
      role: "Change Tracking Infrastructure Lead"
      background: "Built audit trail systems for financial regulations compliance"
      perspective: "Every change must be traceable for accountability"

    - name: "Prof. James Miller"
      role: "Knowledge Graph Evolution Researcher"
      background: "Studies how ontologies and taxonomies change over time"
      perspective: "Relationships evolve just like entities do"

    - name: "Aisha Okonkwo"
      role: "Annotation and Provenance Expert"
      background: "Built scientific data provenance tracking systems"
      perspective: "Track not just what changed, but why and under what conditions"

    - name: "Dr. Marco Vitale"
      role: "Time-Travel Query Designer"
      background: "Created systems for querying historical states of databases"
      perspective: "Users should query 'what did we know on date X about topic Y?'"

methodology:
  approach: "Git-like versioning with semantic awareness"
  principles:
    - "Every knowledge change is versioned with metadata"
    - "Support time-travel queries (state at specific point in time)"
    - "Track both content changes and relationship changes"
    - "Enable branching (experimental knowledge) and merging"
    - "Provide rich diffs showing conceptual changes"
    - "Maintain complete audit trail for accountability"

diversity_dimensions:
  - "Systems thinking: VCS vs Temporal databases vs Wiki history vs Scientific knowledge evolution"
  - "Geographic: Netherlands, USA, India, USA (2), Mexico, Japan, UAE, UK, Nigeria, Italy"
  - "Domain: Git internals, Databases, Collaboration platforms, Science history, Enterprise backup, Diff algorithms, Compliance, Ontologies, Scientific provenance, Query systems"
  - "Time models: Valid-time vs Transaction-time vs Bi-temporal"
  - "Granularity: Line-level vs Paragraph-level vs Concept-level"

core_questions:
  - "What constitutes a 'version' of knowledge?"
  - "How do we capture the reason for each change?"
  - "How do we query historical states efficiently?"
  - "How do we visualize knowledge evolution over time?"
  - "How do we handle branching and merging of knowledge?"
  - "What metadata should be captured with each version?"
  - "How do we compress historical versions to save space?"
