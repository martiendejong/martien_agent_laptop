# Expert Team Round 06: Auto-Documentation Generation
# Theme: Automated documentation generation and maintenance
# Date: 2026-02-05

expert_team:
  round: 6
  theme: "Auto-Documentation Generation"
  focus: "Systems that automatically generate and maintain documentation from code, actions, and context"

  experts:
    - name: "Dr. Rebecca Thornton"
      role: "Documentation Engineering Lead"
      background: "Built documentation systems for Microsoft Docs and GitHub Pages"
      perspective: "Documentation is code - generate it from single source of truth"

    - name: "Hiroshi Nakamura"
      role: "API Documentation Automation Expert"
      background: "Created Swagger/OpenAPI auto-generation tools"
      perspective: "APIs should document themselves through introspection"

    - name: "Dr. Elena Popov"
      role: "Natural Language Generation Researcher"
      background: "PhD in computational linguistics, built GPT-based doc generators"
      perspective: "LLMs can transform technical artifacts into human-readable docs"

    - name: "Marcus Washington"
      role: "DevOps Documentation Architect"
      background: "Automated infrastructure-as-code documentation at AWS"
      perspective: "Infrastructure changes should auto-update documentation"

    - name: "Dr. Ling Chen"
      role: "Knowledge Graph Documentation Specialist"
      background: "Built semantic documentation systems for medical knowledge bases"
      perspective: "Documentation is a graph - entities, relationships, and properties"

    - name: "Aisha Rahman"
      role: "Living Documentation Advocate"
      background: "BDD/Gherkin expert, created executable specification frameworks"
      perspective: "Tests are documentation - they never lie about system behavior"

    - name: "Prof. Johan Svensson"
      role: "Code-to-Doc Pipeline Architect"
      background: "Built Doxygen, JSDoc, and Sphinx automation pipelines"
      perspective: "Parse source code, extract semantics, generate comprehensive docs"

    - name: "Keisha Brown"
      role: "Documentation UX Designer"
      background: "User research for Stack Overflow and MDN documentation"
      perspective: "Auto-generated docs must serve actual user needs, not just exist"

    - name: "Dr. Paolo Rossi"
      role: "Version-Controlled Documentation Expert"
      background: "Git-based documentation systems, docs-as-code movements"
      perspective: "Documentation versions must align with code versions perfectly"

    - name: "Yuki Tanaka"
      role: "Multi-Format Documentation Generator"
      background: "Pandoc contributor, universal document conversion expert"
      perspective: "One source → many formats (HTML, PDF, Markdown, man pages)"

    - name: "Dr. Fatima Al-Said"
      role: "Incremental Documentation Systems Researcher"
      background: "Studies how documentation degrades over time and stays fresh"
      perspective: "Documentation requires continuous maintenance, not one-time generation"

    - name: "Raj Patel"
      role: "Template-Based Generation Expert"
      background: "Built Jinja2/Handlebars systems for documentation templating"
      perspective: "Separate content from presentation - templates enable consistency"

methodology:
  approach: "Multi-source documentation synthesis with continuous updates"
  principles:
    - "Documentation should be generated from authoritative sources (code, logs, actions)"
    - "Never manually maintain what can be auto-generated"
    - "Documentation is a product of the system, not an afterthought"
    - "Keep documentation close to the source (co-location principle)"
    - "Version documentation with the code it describes"
    - "Make documentation generation fast enough to run on every change"

diversity_dimensions:
  - "Systems thinking: Code introspection vs NLG vs Graph-based vs Template engines"
  - "Geographic: USA, Japan, Russia, USA (2), China, Kenya, Sweden, USA (3), Italy, Japan, UAE, India"
  - "Domain: Microsoft Docs, API design, NLP, Cloud infra, Medical knowledge, BDD, Static analysis, UX, Version control, Document conversion, Decay research, Templating"
  - "Scale: Single API → Entire platform documentation"
  - "Maintenance models: One-time generation vs Continuous updates vs Event-triggered"

core_questions:
  - "What are the authoritative sources of truth for documentation?"
  - "How do we extract structured information from unstructured sources?"
  - "How do we keep generated documentation fresh without manual intervention?"
  - "What triggers documentation regeneration?"
  - "How do we validate generated documentation for accuracy?"
  - "How do we make auto-generated docs human-friendly?"
  - "How do we handle documentation versioning alongside code versions?"

target_areas:
  - "Code-to-documentation pipelines (C#, PowerShell, JavaScript)"
  - "Action-to-documentation (log agent actions, generate runbooks)"
  - "Configuration-to-documentation (YAML/JSON → readable guides)"
  - "Test-to-documentation (test specs → behavior documentation)"
  - "Database-to-documentation (schema → entity relationship docs)"
  - "API-to-documentation (HTTP endpoints → OpenAPI specs)"
  - "Workflow-to-documentation (git history → changelog)"
  - "Decision-to-documentation (ADRs auto-generated from discussions)"
