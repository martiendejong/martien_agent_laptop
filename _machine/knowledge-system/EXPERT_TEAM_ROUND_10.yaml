methodology:
  approach: "Multi-level interactive graph visualization"
  principles:
    - "Show structure at multiple levels of detail"
    - "Enable interaction (zoom, filter, search, select)"
    - "Use visual encoding effectively (position, size, color, shape)"
    - "Provide context and tooltips for details"
    - "Support both exploration and explanation"
    - "Make visualizations accessible and performant"

diversity_dimensions:
  - "Systems thinking: Academic research vs Web graphics vs Collaboration vs Visual analytics vs Data art"
  - "Geographic: Canada, USA, Brazil, USA (2), Netherlands, USA (3), USA (4), USA (5), USA (6), Italy"
  - "Domain: Research, Web journalism, Social platforms, HCI, Data art, Programming languages, Interactive storytelling, Scientific visualization, Networks, Information design"
  - "Visualization types: Node-link graphs, Treemaps, Heatmaps, Timelines, Dashboards"
  - "Interaction paradigms: Overview+detail, Focus+context, Brushing+linking"

core_questions:
  - "What visual encoding best represents knowledge relationships?"
  - "How do we show hierarchy and network structure simultaneously?"
  - "How do we handle large graphs (1000+ nodes)?"
  - "What interactions are most useful for knowledge exploration?"
  - "How do we visualize temporal evolution of knowledge?"
  - "How do we make visualizations accessible to all users?"
  - "What metrics should be visually encoded (importance, recency, connections)?"

visualization_types:
  graph_layouts:
    - "Force-directed layout (physics simulation)"
    - "Hierarchical tree layout (top-down)"
    - "Circular layout (ring visualization)"
    - "Matrix view (adjacency matrix)"

  time_based:
    - "Timeline (linear progression)"
    - "Stream graph (flowing evolution)"
    - "Animated transitions (morphing)"

  aggregation:
    - "Clustering (group related nodes)"
    - "Heat maps (density visualization)"
    - "Treemaps (hierarchical space-filling)"

  interactive:
    - "Semantic zoom (different details at different scales)"
    - "Filtering (show/hide based on criteria)"
    - "Search highlighting (find in visualization)"
    - "Detail on hover (tooltips)"
