validation_approach:
  functional_tests:
    - "Session resume in <2 seconds"
    - "Can recall last session activities"
    - "Preferences persist across restarts"
    - "Episode search returns relevant results"

  robustness_tests:
    - "Recover from crash (checkpoint restore)"
    - "Handle corrupt session file gracefully"
    - "Multi-agent concurrent access without corruption"

  performance_tests:
    - "Memory overhead <50MB"
    - "Session save <500ms"
    - "Session load <1 second"
    - "Episode search <200ms"

  user_experience:
    - "New session feels like continuation"
    - "Can answer 'what did we do last time?'"
    - "Context continuity across days/weeks"

example_scenarios:
  morning_resume:
    description: "Resume Friday's work on Monday morning"
    flow:
      - "Agent starts Monday 9am"
      - "Loads last session (Friday 5pm)"
      - "Shows: 'Resuming from Friday: Working on social media feature, PR #475 pending'"
      - "Restores: last 5 queries, open files, worktree allocation"
      - "User immediately continues where left off"

  crash_recovery:
    description: "Power failure during session"
    flow:
      - "Agent crashes unexpectedly"
      - "On restart: detects incomplete session"
      - "Shows: 'Previous session ended unexpectedly. Resume from last checkpoint (10 minutes ago)?'"
      - "Restores: state from last auto-checkpoint"
      - "User loses at most 10 minutes of context"

  preference_learning:
    description: "Remember user coding style"
    flow:
      - "User consistently uses snake_case for variables"
      - "Agent observes pattern over multiple sessions"
      - "Stores: {naming_convention: {style: 'snake_case', confidence: 0.85}}"
      - "Next session: Agent proactively uses snake_case"

  episode_recall:
    description: "Remember similar past issue"
    flow:
      - "User: 'CI failing again'"
      - "Agent searches episodes: finds similar issue from 2 weeks ago"
      - "Shows: 'Similar issue on Jan 20: npm cache corruption, solved by clearing cache'"
      - "User: 'Try same solution'"
      - "Issue resolved in 2 minutes vs. 30 minutes debugging"
