methodology:
  approach: "Event-sourcing with intelligent batching"
  principles:
    - "Capture every context-worthy event during conversation"
    - "Batch updates to minimize file I/O overhead"
    - "Use append-only logs for auditability"
    - "Enable instant rollback if updates cause issues"
    - "Separate hot (active session) from cold (archived) context"

