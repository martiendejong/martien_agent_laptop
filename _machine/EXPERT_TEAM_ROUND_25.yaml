methodology:
  approach: "Systematic review for excellence"

  review_dimensions:
    functionality:
      - "Does everything work as designed?"
      - "Are all features complete?"
      - "Are there any bugs?"

    usability:
      - "Is it easy to use?"
      - "Are error messages helpful?"
      - "Is the interface intuitive?"

    performance:
      - "Is it fast enough?"
      - "Does it scale?"
      - "Are there bottlenecks?"

    reliability:
      - "Does it fail gracefully?"
      - "Can it recover from errors?"
      - "Is it resilient?"

    maintainability:
      - "Is the code clean?"
      - "Is it well documented?"
      - "Can others understand it?"

    security:
      - "Are there vulnerabilities?"
      - "Is data protected?"
      - "Are secrets secure?"

  polish_checklist:
    - "Consistent naming everywhere"
    - "Helpful error messages"
    - "Clear documentation"
    - "Examples for everything"
    - "Performance optimization"
    - "Edge case handling"
    - "Beautiful formatting"
    - "No TODOs or FIXMEs"
    - "All warnings resolved"
    - "Tests passing"

  key_questions:
    - "What would embarrass us if users saw it?"
    - "What rough edges remain?"
    - "What could be 10% better?"
    - "What deserves one more pass?"
    - "Where did we cut corners?"
    - "What feedback have we ignored?"
    - "What would delight users?"

diversity_dimensions:
  - "Geographic: Global representation"
  - "Domain: Design, Engineering, QA, Documentation"
  - "Perspective: Creator vs User"
  - "Focus: Macro (architecture) vs Micro (details)"
