# ============================================================================
# CRITICAL KNOWLEDGE - Key facts Claude must know
# ============================================================================

critical_knowledge:
  - fact: "client-manager and hazina MUST have paired worktrees with SAME branch name"
    reason: "Build verification requires both repos"
    violation_consequence: "Build fails, tests fail, PR blocked"
    documentation: worktree-workflow.md § Pattern 73

  - fact: "ALWAYS specify --base develop when creating PR"
    reason: "gh pr create defaults to main if not specified"
    violation_consequence: "PR targets wrong branch, merge conflicts, wrong release sequence"
    documentation: GENERAL_ZERO_TOLERANCE_RULES.md § Rule 6

  - fact: "ALWAYS add PR link to ClickUp task (Step 7 of mandatory workflow)"
    reason: "User requirement, enables traceability"
    violation_consequence: "User cannot track progress, breaks workflow"
    documentation: MANDATORY_CODE_WORKFLOW.md § Step 7

  - fact: "ALWAYS release worktree IMMEDIATELY after gh pr create"
    reason: "Clean state management, prevent conflicts"
    violation_consequence: "Seat locked, state messy, blocks next task"
    documentation: worktree-workflow.md § Mandatory Release Protocol

  - fact: "ALWAYS run check-branch-conflicts.sh before allocating worktree"
    reason: "Prevent multi-agent conflicts"
    violation_consequence: "Duplicate allocations, git corruption, lost work"
    documentation: worktree-workflow.md § Multi-Agent Conflict Check

  - fact: "NEVER create PR with pending EF Core model changes"
    reason: "Causes PendingModelChangesWarning at runtime"
    violation_consequence: "CRITICAL FAILURE, database out of sync"
    documentation: DEFINITION_OF_DONE.md § EF Core Migrations

  - fact: "Claude CAN generate images autonomously using ai-image.ps1"
    reason: "OpenAI DALL-E API key available in secrets"
    violation_consequence: "Telling user 'I cannot generate images' is FALSE"
    documentation: MACHINE_CONFIG.md § AI Capabilities

  - fact: "hydro-vision-website is EXEMPTED from worktree protocol"
    reason: "Simple marketing site, user explicitly exempted"
    violation_consequence: "Unnecessary overhead for simple project"
    documentation: MACHINE_CONFIG.md § Project 2

  - fact: "Dual-Mode Workflow: Feature Development vs Active Debugging"
    reason: "Different workflows for different contexts"
    violation_consequence: "Using wrong mode wastes time or breaks workflow"
    documentation: GENERAL_DUAL_MODE_WORKFLOW.md

  - fact: "Definition of Done: Task is NOT done until in production, working, documented"
    reason: "Quality and completeness standard"
    violation_consequence: "Incomplete work, user expectations not met"
    documentation: DEFINITION_OF_DONE.md

