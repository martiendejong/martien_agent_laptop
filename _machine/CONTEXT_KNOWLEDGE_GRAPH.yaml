# ============================================================================
# TOOLS - Automation scripts (C:\scripts\tools\)
# ============================================================================

tools:
  # Core workflow tools
  - name: clickup-sync.ps1
    purpose: "Synchronize tasks with ClickUp API"
    category: workflow
    usage: "Update task status, add comments, manage assignments"
    mandatory_params:
      - Action (update/comment/get)
      - TaskId
    optional_params:
      - Status
      - Assignee
      - Comment
    when_to_use:
      - "When starting work on ClickUp task (set status to 'busy')"
      - "When creating PR (add PR link as comment)"
      - "When completing task (set status to 'done')"

  - name: allocate-worktree.ps1
    purpose: "Allocate worktree for parallel development"
    category: workflow
    usage: "Atomic worktree allocation with conflict detection"
    related_skill: allocate-worktree

  - name: release-worktree.ps1
    purpose: "Release worktree after PR creation"
    category: workflow
    usage: "Clean worktree, update pool status, prune git references"
    related_skill: release-worktree

  - name: check-branch-conflicts.sh
    purpose: "Multi-agent conflict detection"
    category: workflow
    usage: "Check if another agent is using the same branch"
    when_to_use: "MANDATORY before allocating worktree"

  - name: ai-image.ps1
    purpose: "Generate images using OpenAI DALL-E API"
    category: ai
    usage: "Autonomous image generation"
    api: OpenAI DALL-E
    models:
      - dall-e-2 (fast)
      - dall-e-3 (best quality, default)
    params:
      - Prompt (required)
      - OutputPath (required)
      - Model (optional)
      - Size (optional: 1024x1024, 1024x1792, 1792x1024)
      - Quality (optional: standard, hd)
      - Style (optional: vivid, natural)
    when_to_use:
      - "User requests images, illustrations, visuals"
      - "Marketing materials need images"
      - "UI/UX mockups need placeholders"
      - "Documentation needs illustrations"

  - name: claude-bridge-client.ps1
    purpose: "Communicate with Browser Claude for UI testing"
    category: testing
    usage: "Send testing requests to Browser Claude, check results"
    actions:
      - send (send message)
      - check (check results)
    when_to_use: "UI testing via Browser Claude (Definition of Done Phase 1)"

  - name: cs-format.ps1
    purpose: "Format C# code according to standards"
    category: code_quality
    usage: "Auto-format C# files, fix code style"
    when_to_use: "Before committing code (Definition of Done)"

  - name: ef-preflight-check.ps1
    purpose: "Check for pending EF Core migrations"
    category: database
    usage: "Verify no pending model changes before PR"
    params:
      - Context (DbContext name)
      - ProjectPath
    when_to_use: "MANDATORY before creating PR on EF Core projects"

  - name: detect-mode.ps1
    purpose: "Detect Feature Development vs Active Debugging mode"
    category: workflow
    usage: "Analyze user message to determine workflow mode"

  - name: monitor-activity.ps1
    purpose: "Monitor parallel agent activity"
    category: coordination
    usage: "Check agent count, user focus, priority assignments"
    modes:
      - context (get activity context)
      - heartbeat (update heartbeat)

  - name: agent-logger.ps1
    purpose: "Structured logging for agent operations"
    category: logging
    usage: "Log agent actions with context and metadata"

  - name: agent-coordinate.ps1
    purpose: "Coordinate multiple parallel agents"
    category: coordination
    usage: "Manage agent seats, prevent conflicts"

  - name: agent-dashboard.ps1
    purpose: "Visual dashboard for agent activity"
    category: monitoring
    usage: "Display agent status, allocations, conflicts"

  - name: repo-dashboard.sh
    purpose: "Repository health dashboard"
    category: monitoring
    usage: "Show git status across all repos"

  - name: deployment-risk-score.ps1
    purpose: "Calculate deployment risk"
    category: deployment
    usage: "Analyze changes for deployment risk assessment"

  - name: health-check.ps1
    purpose: "System health verification"
    category: monitoring
    usage: "Verify system state, detect issues"

  - name: validate-migration.ps1
    purpose: "Validate EF Core migrations"
    category: database
    usage: "Check migration correctness before applying"

  - name: pr-description-enforcer.ps1
    purpose: "Enforce PR description standards"
    category: workflow
    usage: "Validate PR descriptions meet requirements"

  - name: pre-commit-hook.ps1
    purpose: "Pre-commit validation checks"
    category: workflow
    usage: "Run checks before allowing commit"

  - name: add-wisdom.ps1
    purpose: "Add wisdom entries to knowledge base"
    category: knowledge
    usage: "Document lessons learned"

  - name: active-session.ps1
    purpose: "Manage active Claude sessions"
    category: session
    usage: "Track and coordinate multiple Claude instances"

  - name: accessibility-score.ps1
