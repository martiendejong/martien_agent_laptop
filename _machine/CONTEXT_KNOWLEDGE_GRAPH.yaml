# ============================================================================
# WORKFLOWS - Key workflows and their components
# ============================================================================

workflows:
  - name: mandatory_code_workflow
    documentation: C:\scripts\MANDATORY_CODE_WORKFLOW.md
    steps: 7
    description: "NON-NEGOTIABLE 7-step workflow for all code changes"
    steps_detail:
      1: "Create branch (type/clickup-id-description)"
      2: "Assign worktree agent to branch"
      3: "Make changes in worktree"
      4: "Merge develop into branch"
      5: "Ensure build passes and tests pass"
      6: "Create pull request"
      7: "Add PR link to ClickUp task (MANDATORY)"
    tools_used:
      - clickup-sync.ps1
      - allocate-worktree.ps1
      - check-branch-conflicts.sh
      - release-worktree.ps1
    skills_used:
      - allocate-worktree
      - release-worktree
      - clickhub-coding-agent

  - name: worktree_allocation
    documentation: C:\scripts\worktree-workflow.md
    description: "Allocate isolated worktree for feature development"
    prerequisites:
      - Conflict check passes (check-branch-conflicts.sh)
      - FREE worktree seat available
      - Base repo on develop branch
    steps:
      - Find FREE seat in worktrees.pool.md
      - Mark seat BUSY (atomic)
      - Create git worktree
      - Allocate paired Hazina worktree (if client-manager)
      - Update tracking files (pool.md, activity.md, instances.map.md)
    tools_used:
      - check-branch-conflicts.sh
      - allocate-worktree.ps1
    skills_used:
      - allocate-worktree

  - name: worktree_release
    documentation: C:\scripts\worktree-workflow.md
    description: "Release worktree after PR creation"
    timing: "IMMEDIATELY after gh pr create"
    steps:
      - Clean worktree directory (rm -rf)
      - Update pool.md (BUSY → FREE)
      - Log release in activity.md
      - Commit tracking files
      - Switch base repos to develop
      - Prune worktree references
      - THEN present PR to user
    tools_used:
      - release-worktree.ps1
    skills_used:
      - release-worktree

  - name: pr_creation
    documentation: C:\scripts\git-workflow.md
    description: "Create pull request with proper base branch"
    requirements:
      - Build passes (dotnet build)
      - Tests pass (dotnet test)
      - Develop merged into branch
      - PR base is develop (NOT main)
    steps:
      - Commit all changes
      - Push to origin
      - gh pr create --base develop
      - Verify base branch (gh pr view --json baseRefName)
      - Add PR link to ClickUp task
    tools_used:
      - clickup-sync.ps1
    skills_used:
      - github-workflow

  - name: definition_of_done
    documentation: C:\scripts\_machine\DEFINITION_OF_DONE.md
    description: "Complete checklist before task is considered DONE"
    phases: 7
    phases_detail:
      1: "Development (branch, code, tests, format)"
      2: "Quality Assurance (build, tests, review, security, performance)"
      3: "Version Control (commit, push, PR)"
      4: "Integration (merge to develop, CI/CD)"
      5: "Deployment (staging, production, verification)"
      6: "Documentation (user docs, technical docs, changelog)"
      7: "Communication (notify stakeholders, update ClickUp, reflection log)"
    principle: "DONE = In production, working, documented, and verified"

  - name: dual_mode_decision
    documentation: C:\scripts\GENERAL_DUAL_MODE_WORKFLOW.md
    description: "Decide between Feature Development Mode vs Active Debugging Mode"
    decision_tree:
      question: "Is user actively debugging?"
      yes: "Active Debugging Mode (work in base repo, no worktrees)"
      no: "Feature Development Mode (use worktrees, create PRs)"
    indicators_for_debug_mode:
      - User posts build errors
      - User says "I'm working on branch X"
      - User mentions "debugging in IDE"
      - Quick fix requests
    indicators_for_feature_mode:
      - New feature request
      - Refactoring request
      - Architectural changes
      - Will result in PR

  - name: ef_core_migrations
    documentation: C:\scripts\_machine\DEFINITION_OF_DONE.md
    description: "Safe EF Core migration workflow"
    critical_rule: "NEVER create PR with pending model changes"
    steps:
      - Before PR: Run ef migrations has-pending-model-changes
      - If pending: Create migration (ef migrations add)
      - Review migration Up/Down methods
      - Build (verify migration compiles)
      - Apply locally (ef database update)
      - Commit migration WITH feature (not separate)
      - Create PR (migration included)
    tools_used:
      - ef-preflight-check.ps1
      - validate-migration.ps1
    skills_used:
      - ef-migration-safety

  - name: parallel_agent_coordination
    documentation: C:\scripts\_machine\SYSTEM_INTEGRATION.md
    description: "Coordinate multiple agents working simultaneously"
    applies_when: "agentCount > 1"
    strategies:
      optimistic: "< 3 agents - fast path, minimal overhead"
      pessimistic: "≥ 3 agents - slow path with jitter (0-500ms delay)"
    components:
      - Heartbeat mechanism (10-60 second updates)
      - Conflict detection (mandatory before allocation)
      - Priority assignments (user-focused=100, background=50)
      - Activity monitoring
      - Metrics logging
    tools_used:
      - monitor-activity.ps1
      - check-branch-conflicts.sh
      - agent-coordinate.ps1
    skills_used:
      - multi-agent-conflict
      - parallel-agent-coordination

