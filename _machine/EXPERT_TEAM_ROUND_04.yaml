      perspective: "Separate interface from storage implementation"

methodology:
  approach: "Layered persistence with consolidation"
  principles:
    - "Hot state (current session) vs warm (recent) vs cold (archived)"
    - "Progressive consolidation as sessions age"
    - "Multiple durability levels by importance"
    - "Fast restore for recent sessions"
    - "Indexed search across all historical sessions"
