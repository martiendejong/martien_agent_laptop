    - name: "Dmitri Volkov"
      role: "Checkpoint/Restore Developer"
      background: "CRIU (Checkpoint/Restore In Userspace) contributor"
      perspective: "Full process state serialization and restoration"

    - name: "Dr. Margaret Hamilton"
      role: "Software Reliability Engineer"
