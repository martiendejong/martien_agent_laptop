    focus: "Images, diagrams, audio in knowledge base"
    sample_experts:
      - "Dr. Fei-Fei Li (Computer Vision)"
      - "Yann LeCun (Deep Learning for Vision)"
      - "Dr. Devi Parikh (Visual Question Answering)"

