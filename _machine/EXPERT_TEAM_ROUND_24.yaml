methodology:
  approach: "Analyze improvement process to find meta-patterns"

  analysis_levels:
    improvement_effectiveness:
      - "Which types of improvements have highest value/effort ratio?"
      - "Which expert perspectives contribute most?"
      - "Which analysis methods yield best insights?"

    learning_patterns:
      - "How do improvements in round N affect round N+1?"
      - "What patterns repeat across rounds?"
      - "Which improvements enable future improvements?"

    process_optimization:
      - "Is 1000-expert team optimal? Or 500? 2000?"
      - "Is top-5 selection best? Or top-3? Top-10?"
      - "Should rounds be themed or exploratory?"

    knowledge_transfer:
      - "How to transfer insights across domains?"
      - "Can client-manager improvements help hazina?"
      - "Can this process apply to other systems?"

  key_questions:
    - "What have we learned about learning?"
    - "Which improvement strategies work best?"
    - "How to accelerate future rounds?"
    - "What meta-patterns exist across all rounds?"
    - "How to transfer this process to new domains?"
    - "What makes a good expert team?"
    - "How to measure improvement quality?"

  meta_insights_to_extract:
    value_patterns:
      - "High-value improvements often involve feedback loops"
      - "Integration creates multiplicative value"
      - "Resilience prevents value destruction"

    effort_patterns:
      - "PowerShell scripts: low effort, high value"
      - "Integration work: medium effort, high value"
      - "New concepts: high effort, medium value"

    effectiveness_patterns:
      - "Concrete implementations beat abstract frameworks"
      - "Working examples beat documentation"
      - "Incremental improvements beat rewrites"

diversity_dimensions:
  - "Geographic: Global representation"
  - "Domain: ML, Psychology, Education, Theory"
  - "Approach: Empirical vs Theoretical vs Practical"
  - "Timeframe: Real-time learning vs Long-term learning"
