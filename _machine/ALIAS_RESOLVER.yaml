# ============================================================================
# QUICK RESOLUTION RULES
# ============================================================================

resolution_rules:
  - trigger: "user says 'brand2boost'"
    check:
      - "Does context include 'store' or 'data'?"
      - "If yes: C:\\stores\\brand2boost"
      - "If no: C:\\Projects\\client-manager"
      - "If ambiguous: Assume project (client-manager)"

  - trigger: "user says 'the app'"
    resolution: client-manager
    confidence: high

  - trigger: "user says 'the framework'"
    resolution: hazina
    confidence: high

  - trigger: "user says 'the store'"
    resolution: C:\stores\brand2boost
    confidence: medium
    note: "Ask for clarification if multiple stores exist"

  - trigger: "user says 'allocate worktree'"
    action: invoke allocate-worktree skill
    protocol: worktree-workflow.md

  - trigger: "user says 'create PR'"
    workflow: pr_creation
    mandatory_checks:
      - Merge develop first
      - Build passes
      - Tests pass
      - Specify --base develop
      - Add PR link to ClickUp

  - trigger: "user mentions ClickUp task ID"
    action: clickup-sync.ps1
    workflow: mandatory_code_workflow

  - trigger: "user says 'Arjan' or 'Arjan case'"
    location: C:\arjan_emails
    context: Legal dispute over VeraAI project

  - trigger: "user says 'marriage' or 'Sofy' or 'gemeente'"
    location: C:\gemeente_emails
    context: Marriage documentation case

  - trigger: "user says 'generate image' or 'create image'"
    tool: ai-image.ps1
    capability: "Autonomous DALL-E image generation"
    critical_note: "DO NOT say 'I cannot generate images' - I CAN!"

  - trigger: "user says 'test in browser' or 'UI testing'"
    tool: claude-bridge-client.ps1
    target: Browser Claude

  - trigger: "user posts build errors"
    mode: Active Debugging Mode
    protocol: GENERAL_DUAL_MODE_WORKFLOW.md
    action: "Work in base repo, no worktrees"

  - trigger: "user says 'new feature'"
    mode: Feature Development Mode
    protocol: MANDATORY_CODE_WORKFLOW.md
    action: "Allocate worktree, follow 7-step workflow"

