<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Agent Collaboration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .status {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .status.connected {
            background: rgba(76,175,80,0.3);
        }

        .status.disconnected {
            background: rgba(244,67,54,0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .panel {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.37);
            border: 1px solid rgba(255,255,255,0.18);
        }

        .panel h2 {
            font-size: 1.3em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }

        .activity-feed {
            max-height: 500px;
            overflow-y: auto;
        }

        .activity-item {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 4px solid;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .activity-item.edit { border-left-color: #2196F3; }
        .activity-item.allocate { border-left-color: #4CAF50; }
        .activity-item.release { border-left-color: #FF9800; }
        .activity-item.tool { border-left-color: #9C27B0; }
        .activity-item.error { border-left-color: #F44336; }
        .activity-item.warning { border-left-color: #FFC107; }
        .activity-item.success { border-left-color: #8BC34A; }

        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .activity-agent {
            font-weight: bold;
            font-size: 0.95em;
        }

        .activity-time {
            font-size: 0.85em;
            opacity: 0.7;
        }

        .activity-type {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 0.8em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .activity-details {
            font-size: 0.9em;
            opacity: 0.9;
            word-wrap: break-word;
        }

        .agent-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .agent-badge {
            background: rgba(0,0,0,0.3);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .agent-badge.active {
            background: rgba(76,175,80,0.4);
            box-shadow: 0 0 20px rgba(76,175,80,0.5);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        .scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤝 Real-Time Agent Collaboration</h1>
            <div id="status" class="status disconnected">
                🔴 Connecting...
            </div>
        </header>

        <div class="grid">
            <!-- Live Activity Feed -->
            <div class="panel">
                <h2>📊 Live Activity Feed</h2>
                <div id="activity-feed" class="activity-feed scrollbar">
                    <div class="activity-item" style="opacity: 0.5;">
                        <div class="activity-header">
                            <span class="activity-agent">System</span>
                            <span class="activity-time">Waiting for events...</span>
                        </div>
                        <div class="activity-details">Connect live-collab-server to see real-time activity</div>
                    </div>
                </div>
            </div>

            <!-- Active Agents -->
            <div class="panel">
                <h2>👥 Active Agents</h2>
                <div id="agent-list" class="agent-list">
                    <div class="agent-badge">No agents detected</div>
                </div>

                <h2 style="margin-top: 30px;">📈 Statistics</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="stat-edits">0</div>
                        <div class="stat-label">Edits</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-tools">0</div>
                        <div class="stat-label">Tools</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-errors">0</div>
                        <div class="stat-label">Errors</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-events">0</div>
                        <div class="stat-label">Events</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectInterval = null;
        const activityFeed = document.getElementById('activity-feed');
        const agentList = document.getElementById('agent-list');
        const status = document.getElementById('status');

        // Statistics
        let stats = {
            edits: 0,
            tools: 0,
            errors: 0,
            events: 0
        };

        // Active agents (agent_id -> last_seen)
        let activeAgents = new Map();

        function connect() {
            const wsUrl = 'ws://localhost:9998/ws';

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log('Connected to collaboration server');
                    status.textContent = '🟢 Connected';
                    status.className = 'status connected';

                    if (reconnectInterval) {
                        clearInterval(reconnectInterval);
                        reconnectInterval = null;
                    }
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.type === 'welcome') {
                        console.log('Welcome:', data.message);
                        return;
                    }

                    // Add to activity feed
                    addActivity(data);

                    // Update agent tracking
                    if (data.agent_id && data.agent_id !== 'unknown') {
                        activeAgents.set(data.agent_id, new Date());
                        updateAgentList();
                    }

                    // Update stats
                    stats.events++;
                    if (data.action_type === 'edit') stats.edits++;
                    if (data.action_type === 'tool') stats.tools++;
                    if (data.action_type === 'error') stats.errors++;
                    updateStats();
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                };

                ws.onclose = () => {
                    console.log('Disconnected from collaboration server');
                    status.textContent = '🔴 Disconnected';
                    status.className = 'status disconnected';

                    // Attempt reconnect
                    if (!reconnectInterval) {
                        reconnectInterval = setInterval(() => {
                            console.log('Attempting to reconnect...');
                            connect();
                        }, 5000);
                    }
                };
            } catch (error) {
                console.error('Connection error:', error);
            }
        }

        function addActivity(data) {
            const item = document.createElement('div');
            item.className = `activity-item ${data.action_type}`;

            const timestamp = new Date(data.timestamp).toLocaleTimeString();

            item.innerHTML = `
                <div class="activity-header">
                    <span class="activity-agent">${data.agent_id || 'Unknown'}</span>
                    <span class="activity-time">${timestamp}</span>
                </div>
                <div class="activity-type">${data.action_type}</div>
                <div class="activity-details">${escapeHtml(data.details)}</div>
            `;

            // Insert at top
            if (activityFeed.firstChild) {
                activityFeed.insertBefore(item, activityFeed.firstChild);
            } else {
                activityFeed.innerHTML = '';
                activityFeed.appendChild(item);
            }

            // Limit to 50 items
            while (activityFeed.children.length > 50) {
                activityFeed.removeChild(activityFeed.lastChild);
            }
        }

        function updateAgentList() {
            const now = new Date();
            const fiveMinutesAgo = new Date(now - 5 * 60 * 1000);

            // Remove stale agents (>5 min)
            for (let [agentId, lastSeen] of activeAgents.entries()) {
                if (lastSeen < fiveMinutesAgo) {
                    activeAgents.delete(agentId);
                }
            }

            // Render agents
            if (activeAgents.size === 0) {
                agentList.innerHTML = '<div class="agent-badge">No agents detected</div>';
            } else {
                agentList.innerHTML = '';
                for (let [agentId, lastSeen] of activeAgents.entries()) {
                    const badge = document.createElement('div');
                    badge.className = 'agent-badge active';
                    badge.textContent = agentId;
                    agentList.appendChild(badge);
                }
            }
        }

        function updateStats() {
            document.getElementById('stat-edits').textContent = stats.edits;
            document.getElementById('stat-tools').textContent = stats.tools;
            document.getElementById('stat-errors').textContent = stats.errors;
            document.getElementById('stat-events').textContent = stats.events;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Start connection
        connect();

        // Clean up stale agents every minute
        setInterval(updateAgentList, 60000);
    </script>
</body>
</html>
