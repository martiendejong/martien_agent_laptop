<!DOCTYPE html>
<html>
<head>
    <title>Knowledge Graph Visualizer - Round 10</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #1a1a1a; color: #fff; }
        #graph { width: 100%; height: 800px; border: 1px solid #444; background: #2a2a2a; }
        .node { stroke: #fff; stroke-width: 2px; cursor: pointer; }
        .node:hover { stroke: #ff0; stroke-width: 3px; }
        .link { stroke: #999; stroke-opacity: 0.6; }
        .label { font-size: 10px; fill: #fff; pointer-events: none; }
        #controls { margin-bottom: 20px; }
        button { padding: 10px; margin: 5px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h1>Knowledge Graph Visualizer</h1>
    <div id="controls">
        <button onclick="zoomIn()">Zoom In</button>
        <button onclick="zoomOut()">Zoom Out</button>
        <button onclick="resetZoom()">Reset</button>
        <button onclick="toggleLabels()">Toggle Labels</button>
    </div>
    <div id="graph"></div>

    <script>
        // Sample knowledge graph data
        const graphData = {
            nodes: [
                { id: "CLAUDE.md", group: "core", size: 40 },
                { id: "STARTUP_PROTOCOL.md", group: "core", size: 20 },
                { id: "CAPABILITIES.md", group: "capabilities", size: 28 },
                { id: "worktree-workflow.md", group: "workflow", size: 15 },
                { id: "git-workflow.md", group: "workflow", size: 15 },
                { id: "MACHINE_CONFIG.md", group: "config", size: 20 },
                { id: "best-practices/", group: "patterns", size: 25 },
                { id: "session-delta.yaml", group: "runtime", size: 10 },
                { id: "conversation-events.log", group: "runtime", size: 12 },
                { id: "context-prediction-rules.yaml", group: "prediction", size: 15 }
            ],
            links: [
                { source: "CLAUDE.md", target: "STARTUP_PROTOCOL.md", value: 10 },
                { source: "CLAUDE.md", target: "MACHINE_CONFIG.md", value: 8 },
                { source: "STARTUP_PROTOCOL.md", target: "CAPABILITIES.md", value: 6 },
                { source: "worktree-workflow.md", target: "git-workflow.md", value: 9 },
                { source: "CLAUDE.md", target: "worktree-workflow.md", value: 5 },
                { source: "best-practices/", target: "session-delta.yaml", value: 4 },
                { source: "conversation-events.log", target: "context-prediction-rules.yaml", value: 7 }
            ]
        };

        const width = document.getElementById('graph').clientWidth;
        const height = 800;

        const svg = d3.select("#graph")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");

        // Color scale
        const color = d3.scaleOrdinal(d3.schemeCategory10);

        // Create force simulation
        const simulation = d3.forceSimulation(graphData.nodes)
            .force("link", d3.forceLink(graphData.links).id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-400))
            .force("center", d3.forceCenter(width / 2, height / 2));

        // Create links
        const link = g.append("g")
            .selectAll("line")
            .data(graphData.links)
            .enter().append("line")
            .attr("class", "link")
            .attr("stroke-width", d => Math.sqrt(d.value));

        // Create nodes
        const node = g.append("g")
            .selectAll("circle")
            .data(graphData.nodes)
            .enter().append("circle")
            .attr("class", "node")
            .attr("r", d => d.size)
            .attr("fill", d => color(d.group))
            .call(drag(simulation))
            .on("click", showNodeInfo);

        // Add labels
        const label = g.append("g")
            .selectAll("text")
            .data(graphData.nodes)
            .enter().append("text")
            .attr("class", "label")
            .text(d => d.id);

        // Update positions
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);

            label
                .attr("x", d => d.x + d.size + 5)
                .attr("y", d => d.y + 4);
        });

        // Drag behavior
        function drag(simulation) {
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // Zoom functionality
        const zoom = d3.zoom()
            .scaleExtent([0.1, 10])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        function zoomIn() { svg.transition().call(zoom.scaleBy, 1.3); }
        function zoomOut() { svg.transition().call(zoom.scaleBy, 0.7); }
        function resetZoom() { svg.transition().call(zoom.transform, d3.zoomIdentity); }
        function toggleLabels() {
            const labels = d3.selectAll(".label");
            labels.style("display", labels.style("display") === "none" ? "block" : "none");
        }

        function showNodeInfo(event, d) {
            alert(`File: ${d.id}\nGroup: ${d.group}\nSize: ${d.size}\nConnections: ${graphData.links.filter(l => l.source.id === d.id || l.target.id === d.id).length}`);
        }
    </script>
</body>
</html>
